name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main. Skipping release."
            exit 1
          fi

      - name: Build distribution
        run: ./scripts/build_release.sh

      - name: Compute release metadata
        id: meta
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          VERSION_TAG="${VERSION//./_}"
          HTML_PATH="dist/Inspector_Blanque_v${VERSION_TAG}_single_file.html"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "html_path=${HTML_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload single-file app
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.html_path }}
